name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to attach binaries to (e.g. v0.1.1)
        required: true
        type: string

permissions:
  contents: read

jobs:
  upload-assets:
    name: ${{ matrix.target }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Build and upload archive
        uses: taiki-e/upload-rust-binary-action@f0d45ae91ee7b8ee928de7a9d04d893a08bcbec6 # v1.30.2
        with:
          bin: secunit
          target: ${{ matrix.target }}
          tar: unix
          locked: true
          checksum: sha256
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || '' }}

  # The GUI is a Tauri app kept out of `default-members`; build it only here,
  # for macOS, and attach the .dmg to the release the CLI job created. The
  # bundle is unsigned — install instructions cover the Gatekeeper step.
  gui-macos:
    name: gui-${{ matrix.target }}
    needs: upload-assets
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        target:
          - aarch64-apple-darwin
          - x86_64-apple-darwin
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install frontend dependencies
        working-directory: crates/secunit-gui
        run: |
          corepack enable || sudo corepack enable
          pnpm install --frozen-lockfile

      - name: Build app bundle
        working-directory: crates/secunit-gui
        # `pnpm exec`, not the `tauri:build` script: a script + `--` makes pnpm
        # forward a literal `--` that Tauri hands to cargo, breaking `--bundles`.
        # The runner's CI=true is what lets bundle_dmg.sh skip Finder styling.
        run: pnpm exec tauri build --target ${{ matrix.target }} --bundles dmg

      - name: Upload .dmg to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
        run: |
          dmg=$(find . -path "*/${{ matrix.target }}/release/bundle/dmg/*.dmg" -not -path '*/node_modules/*' | head -1)
          if [ -z "$dmg" ]; then echo "no .dmg produced for ${{ matrix.target }}" >&2; exit 1; fi
          dest="secunit-${{ matrix.target }}.dmg"
          cp "$dmg" "$dest"
          gh release upload "$TAG" "$dest" --clobber

  # Publish the library + CLI crates to crates.io so `cargo install` and
  # `cargo binstall bcl-secunit@<tag>` can resolve the version. Runs after the
  # binaries are attached so binstall always finds a prebuilt artifact for the
  # version it just resolved. Requires a CRATES_IO_TOKEN repo secret.
  publish-crates:
    name: publish to crates.io
    needs: upload-assets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - name: Publish crates
        env:
          # cargo reads the token from CARGO_REGISTRY_TOKEN; the repo secret is
          # named CRATES_IO_TOKEN.
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        # Explicit `-p` (not `--workspace`) so the unpublished Tauri GUI crate
        # is never pushed. cargo publishes these in dependency order and waits
        # for each to land on the index before publishing its dependents.
        run: cargo publish --locked -p secunit-core -p secunit-capture -p bcl-secunit
