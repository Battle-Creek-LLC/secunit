repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all -- --check
        language: system
        pass_filenames: false
        files: \.rs$

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
        files: \.(rs|toml)$

      - id: schema-validate
        name: schema validate (cargo test)
        entry: cargo test -p secunit-core --test schema_examples
        language: system
        pass_filenames: false
        files: ^(schemas/|docs/examples/)
